<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡抽籤分組工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', 'Microsoft JhengHei', sans-serif; background-color: #f8fafc; color: #334155; }
        
        /* 完全還原你滿意的硬陰影與邊框細節 */
        .neubrutalism { border: 2px solid #475569; box-shadow: 4px 4px 0px 0px rgba(71, 85, 105, 0.15); }
        .card-result { border: 2px solid #475569; box-shadow: 3px 3px 0px 0px rgba(71, 85, 105, 0.15); }
        
        .card-active { background-color: #ffffff; border: 2px solid #475569; }
        .card-inactive { background-color: #f1f5f9; border: 2px solid #e2e8f0; color: #94a3b8; text-decoration: line-through; }
        
        .order-badge { 
            background-color: #ef4444; color: white; padding: 2px 10px; 
            border-radius: 4px; font-weight: 900; border: 2px solid #475569;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 0.875rem;
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .shuffling { color: #3b82f6; animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }
        
        /* 保持你喜歡的成員欄位感 */
        .member-cols { column-count: 2; column-gap: 1rem; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-4xl font-black text-slate-800">抽籤分組工具 <span class="text-blue-500">.</span></h1>
            </div>
            <button onclick="clearStorage()" class="text-xs font-bold text-slate-400 hover:text-red-500 transition">清空所有名單</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-xl neubrutalism">
                    <label class="block text-lg font-bold mb-3">成員管理</label>
                    <textarea id="inputContent" rows="3" placeholder="貼上名單..."
                        class="w-full p-3 border-2 border-slate-100 rounded-lg focus:border-blue-400 focus:outline-none transition resize-none text-sm bg-slate-50"></textarea>
                    <button onclick="addMembers()" class="w-full mt-3 bg-slate-800 text-white font-bold py-2 rounded-lg hover:bg-slate-700 transition active:translate-y-0.5">
                        批次匯入名單
                    </button>
                    <div class="flex justify-between items-center mt-6 mb-4">
                        <span class="font-bold text-xs text-slate-400 uppercase tracking-widest" id="memberCountLabel">名單 (0)</span>
                        <div class="flex gap-4 text-xs font-bold">
                            <button onclick="toggleAll(true)" class="text-blue-500">全選</button>
                            <button onclick="toggleAll(false)" class="text-slate-400">取消全選</button>
                        </div>
                    </div>
                    <div id="memberList" class="flex flex-wrap gap-2 max-h-[300px] overflow-y-auto pr-2"></div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-4">
                <div class="bg-white p-4 rounded-xl neubrutalism flex flex-wrap items-center gap-4">
                    <div class="flex items-center gap-3 bg-slate-50 p-2 px-4 rounded-lg border-2 border-slate-100">
                        <label class="text-sm font-bold text-slate-400">組數</label>
                        <input id="groupCount" type="number" min="1" value="2" class="w-12 bg-transparent font-black text-xl outline-none text-slate-700">
                    </div>
                    <button onclick="shuffleAndGroup()" class="flex-1 bg-blue-500 text-white font-black py-3 rounded-lg text-lg hover:bg-blue-600 active:translate-y-0.5 transition-all">
                        開始分組
                    </button>
                    <button id="btnDrawOrder" onclick="drawGroupOrderWithEffect()" disabled class="flex-1 bg-amber-400 text-slate-800 font-black py-3 rounded-lg text-lg hover:bg-amber-500 active:translate-y-0.5 transition-all disabled:opacity-30 disabled:grayscale">
                        抽順序
                    </button>
                </div>

                <div id="orderSummary" class="hidden animate-in fade-in slide-in-from-top-2 duration-500">
                    <div class="bg-white border-2 border-amber-200 p-3 px-5 rounded-xl flex items-center gap-3 overflow-x-auto no-scrollbar shadow-sm">
                        <span class="whitespace-nowrap font-black text-amber-600 text-sm italic">順序：</span>
                        <div id="orderPath" class="flex items-center gap-2 font-bold text-slate-600 text-sm"></div>
                    </div>
                </div>

                <div class="flex justify-between items-center px-2">
                    <span id="activeCountLabel" class="text-sm text-blue-500 font-black uppercase tracking-widest">總計 0 人</span>
                </div>

                <div id="resultArea" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <script>
        let members = JSON.parse(localStorage.getItem('my_group_tool_v11') || '[]');
        let currentGroups = [];

        function save() {
            localStorage.setItem('my_group_tool_v11', JSON.stringify(members));
            render();
        }

        function addMembers() {
            const input = document.getElementById('inputContent').value;
            if (!input.trim()) return;
            const names = input.split(/[\n,;，\s\t]+/).map(n => n.trim()).filter(n => n.length > 0);
            names.forEach(name => {
                if (!members.some(m => m.name.toLowerCase() === name.toLowerCase())) {
                    members.push({ name, present: true });
                }
            });
            document.getElementById('inputContent').value = '';
            save();
        }

        function toggleMember(index) {
            members[index].present = !members[index].present;
            save();
        }

        function removeMember(index) {
            members.splice(index, 1);
            save();
        }

        function toggleAll(val) {
            members.forEach(m => m.present = val);
            save();
        }

        function clearStorage() {
            if(confirm('確定要清空所有名單嗎？')) {
                members = [];
                currentGroups = [];
                document.getElementById('resultArea').innerHTML = '';
                document.getElementById('orderSummary').classList.add('hidden');
                document.getElementById('btnDrawOrder').disabled = true;
                save();
            }
        }

        function render() {
            const list = document.getElementById('memberList');
            const memberCountLabel = document.getElementById('memberCountLabel');
            const activeCountLabel = document.getElementById('activeCountLabel');
            list.innerHTML = members.length === 0 ? '<div class="w-full py-10 text-center text-slate-300 italic text-sm">尚未加入成員</div>' : '';
            let activeCount = 0;
            members.forEach((m, idx) => {
                if(m.present) activeCount++;
                const div = document.createElement('div');
                div.className = `${m.present ? 'card-active' : 'card-inactive'} px-3 py-1.5 rounded-lg cursor-pointer font-bold text-sm flex items-center transition-all`;
                div.onclick = () => toggleMember(idx);
                div.innerHTML = `${m.name} <span class="ml-2 text-slate-300 hover:text-red-400 font-black" onclick="event.stopPropagation(); removeMember(${idx})">×</span>`;
                list.appendChild(div);
            });
            memberCountLabel.innerText = `名單 (${members.length})`;
            activeCountLabel.innerText = `總計 ${activeCount} 人`;
        }

        function shuffleAndGroup() {
            const activeOnes = members.filter(m => m.present).map(m => m.name);
            const count = parseInt(document.getElementById('groupCount').value);
            if (activeOnes.length === 0) return alert('請先勾選參與成員');
            if (isNaN(count) || count < 1) return alert('請輸入正確組數');

            const shuffled = activeOnes.sort(() => Math.random() - 0.5);
            currentGroups = Array.from({ length: Math.min(count, shuffled.length) }, (_, i) => ({
                id: i + 1,
                members: [],
                order: null,
                isShuffling: false
            }));
            
            shuffled.forEach((name, i) => currentGroups[i % currentGroups.length].members.push(name));
            document.getElementById('btnDrawOrder').disabled = false;
            document.getElementById('orderSummary').classList.add('hidden');
            renderResults();
        }

        function drawGroupOrderWithEffect() {
            const btn = document.getElementById('btnDrawOrder');
            btn.disabled = true;
            currentGroups.forEach(g => g.isShuffling = true);
            renderResults();

            let counter = 0;
            const interval = setInterval(() => {
                const tempOrders = Array.from({ length: currentGroups.length }, (_, i) => i + 1).sort(() => Math.random() - 0.5);
                currentGroups.forEach((g, i) => {
                    const badge = document.getElementById(`order-badge-${i}`);
                    if(badge) badge.innerText = `順序 ${tempOrders[i]}`;
                });
                counter++;
                if (counter > 10) {
                    clearInterval(interval);
                    const finalOrder = Array.from({ length: currentGroups.length }, (_, i) => i + 1).sort(() => Math.random() - 0.5);
                    currentGroups.forEach((group, i) => {
                        group.isShuffling = false;
                        group.order = finalOrder[i];
                    });
                    renderResults();
                    renderOrderSummary();
                    btn.disabled = false;
                }
            }, 80);
        }

        function renderOrderSummary() {
            const container = document.getElementById('orderSummary');
            const path = document.getElementById('orderPath');
            container.classList.remove('hidden');
            const sorted = [...currentGroups].sort((a, b) => a.order - b.order);
            path.innerHTML = sorted.map((g, i) => 
                `<span>第 ${g.id} 組</span>${i < sorted.length - 1 ? '<span class="text-amber-300 mx-1">→</span>' : ''}`
            ).join('');
        }

        function renderResults() {
            const area = document.getElementById('resultArea');
            area.innerHTML = '';
            currentGroups.forEach((group, i) => {
                const div = document.createElement('div');
                div.className = 'bg-white p-5 rounded-xl card-result flex flex-col min-h-[140px]';
                
                const orderHtml = group.order 
                    ? `<div class="order-badge">順序 ${group.order}</div>` 
                    : (group.isShuffling ? `<div class="order-badge bg-blue-400 shuffling" id="order-badge-${i}">...</div>` : `<div class="h-[28px]"></div>`);

                const listClass = group.members.length > 6 ? 'member-cols' : 'space-y-1';

                div.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-3">
                            <span class="font-black text-xl text-slate-800">第 ${group.id} 組</span>
                            <span class="text-[11px] font-bold text-blue-500 border-2 border-blue-500/10 bg-blue-50/50 px-2 py-0.5 rounded whitespace-nowrap">
                                ${group.members.length} 人
                            </span>
                        </div>
                        ${orderHtml}
                    </div>
                    <div class="${listClass} border-t border-slate-100 pt-3">
                        ${group.members.map(n => `<div class="font-bold text-slate-600 text-base py-0.5 whitespace-nowrap">· ${n}</div>`).join('')}
                    </div>`;
                area.appendChild(div);
            });
        }
        render();
    </script>
</body>
</html>
