                                const data = dailyLogs[key] || {};
                                const totalEx = (Number(data.exerciseTime) || 0) + (Number(data.stretchTime) || 0);
                                const hasActivity = totalEx > 0 || data.practice > 0 || data.fiveMin > 0;
                                const isToday = key === formatDateKey(new Date());
                                return (
                                    <div key={key} className={`bg-white p-3.5 r-card flex items-center justify-between`}
                                        style={{border: hasActivity ? '1px solid var(--c-success)' : '1px solid var(--c-border)', opacity: hasActivity || isToday ? 1 : 0.55,
                                            boxShadow: isToday ? '0 0 0 2px rgba(116,192,252,0.3)' : 'none'}}>
                                        <div className="flex flex-col">
                                            <span className="sans-font text-xs" style={{color:'var(--c-text)'}}>{date.getMonth() + 1}/{date.getDate()}</span>
                                            <span className="text-[10px] sans-font" style={{color:'var(--c-muted)'}}>{['日','一','二','三','四','五','六'][date.getDay()]}</span>
                                        </div>
                                        <div className="flex gap-1.5 items-center">
                                            {data.practice > 0 && <span className="pk-yellow px-2 py-0.5 r-badge text-[9px] sans-font" style={{color:'var(--c-accent-text)'}}>練功 {data.practice}</span>}
                                            {data.fiveMin > 0 && <span className="pk-blue px-2 py-0.5 r-badge text-[9px] sans-font" style={{color:'var(--c-primary-text)'}}>五分鐘 {data.fiveMin}</span>}
                                            {totalEx > 0 && <span className="pk-pink px-2 py-0.5 r-badge text-[9px] sans-font" style={{color:'var(--c-danger-text)'}}>運動 {totalEx}m</span>}
                                            {hasActivity && <Icon name="Smile" size={15} style={{color:'var(--c-accent-text)'}} />}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        const ProfileView = ({ dailyLogs, isAdmin, user, userProfile }) => {
            const mStats = useMemo(() => {
                const now = new Date();
                const prefix = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
                let mActiveDays = 0, mExMins = 0, mStretchMins = 0, mPracCount = 0, mFiveCount = 0;
                // All-time totals for level
                let atActiveDays = 0, atExMins = 0, atStretchMins = 0, atPracCount = 0;
                Object.entries(dailyLogs).forEach(([key, val]) => {
                    const p = val.practice || 0, f = val.fiveMin || 0, e = val.exerciseTime || 0, s = val.stretchTime || 0;
                    if ((p + f + e + s) > 0) atActiveDays++;
                    atExMins += e; atStretchMins += s; atPracCount += p;
                    if (key.startsWith(prefix)) {
                        if ((p + f + e + s) > 0) mActiveDays++;
                        mExMins += e; mStretchMins += s; mPracCount += p; mFiveCount += f;
                    }
                });
                const totalMinutes = mExMins + mStretchMins;
                const totalHoursNum = totalMinutes / 60;
                const atScore = Math.round((atActiveDays * 10) + (atExMins + atStretchMins) / 60 + (atPracCount * 5));
                let realm = { title: "自律新星", level: 1, icon: "Sprout", color: "pk-green" };
                if (atScore >= 600) realm = { title: "自律仙人", level: 90, icon: "Sun", color: "pk-yellow" };

                // 週資料計算
                const getWeekPrefix = (offset) => {

                const thisDays = getWeekPrefix(0); const lastDays = getWeekPrefix(-1);

                    const v = dailyLogs[k] || {};
                    return { ex: acc.ex+(v.exerciseTime||0), st: acc.st+(v.stretchTime||0), pr: acc.pr+(v.practice||0), fi: acc.fi+(v.fiveMin||0) };
                }, {ex:0,st:0,pr:0,fi:0});

                const pct = (a,b) => b===0 ? null : Math.round((a-b)/b*100);

                    {/* 修煉足跡 */}
                    {(() => {
                        const now = new Date();
                        const todayYear = now.getFullYear();
                        const todayMonth = now.getMonth();
                        const todayDate = now.getDate();
                        const [fpOffset, setFpOffset] = useState(0);
                        const viewYear = new Date(todayYear, todayMonth + fpOffset, 1).getFullYear();
                        const viewMonth = new Date(todayYear, todayMonth + fpOffset, 1).getMonth();
                        const isCurrentMonth = (viewYear === todayYear && viewMonth === todayMonth);
                        const today = isCurrentMonth ? todayDate : 0;
                        const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
                        const firstDay = new Date(viewYear, viewMonth, 1).getDay();
                        const prefix = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}`;
                        // 連續天數（從今天往回跨月）
                        let streak = 0;
                        const sd = new Date(now); sd.setHours(0,0,0,0);
                        for (let i = 0; i < 365; i++) {
                            const k = formatDateKey(sd);
                            const v = dailyLogs[k] || {};
                            if ((v.practice||0)+(v.fiveMin||0)+(v.exerciseTime||0)+(v.stretchTime||0) > 0) { streak++; sd.setDate(sd.getDate()-1); }
                            else break;
                        }
                        // 新強度邏輯
                        const intensity = {}; const isGold = {};
                        for (let d = 1; d <= daysInMonth; d++) {
                            const key = `${prefix}-${String(d).padStart(2,'0')}`;
                            const v = dailyLogs[key] || {};
                            const prac = v.practice||0, five = v.fiveMin||0;
                            const exer = v.exerciseTime||0, stre = v.stretchTime||0;
                            const bothTwo = prac >= 2 && five >= 2;
                            const eitherTwo = (prac >= 2 || five >= 2) && !bothTwo;
                            const hasAnyMove = exer > 0 || stre > 0;
                            const hasBothMove = exer > 0 && stre > 0;
                            const totalMove = exer + stre;
                            const hasAny = prac > 0 || five > 0 || exer > 0 || stre > 0;
                            // 邏輯保留，但不會在UI上顯示深綠和金邊
                            if (bothTwo && hasBothMove) { intensity[d] = 3; isGold[d] = totalMove >= 120; }
                            else if (bothTwo && hasAnyMove) intensity[d] = 3;
                            else if (bothTwo) intensity[d] = 2;
                            else if (eitherTwo || hasAny) intensity[d] = 1;
                            else intensity[d] = 0;
                        }
                        // 色系：灰→淡綠→中綠→亮綠（深綠和金邊保留給未來的技能解鎖功能，現在隱藏）
                        const heatColors = ['#f3f4f6','#dcfce7','#bbf7d0','#4ade80'];
                        const heatText   = ['#d1d5db','#166534','#166534','#ffffff'];
                        const cells = [];
                        for (let i = 0; i < firstDay; i++) cells.push(<div key={`e${i}`} style={{height:'26px'}}></div>);
                        for (let d = 1; d <= daysInMonth; d++) {
                            const isFuture = isCurrentMonth && d > today;
                            const lv = isFuture ? -1 : intensity[d];
                            // const gold = !isFuture && isGold[d]; // 註釋：金邊保留給未來使用
                            const bg = lv === -1 ? 'transparent' : heatColors[Math.min(lv, 3)];
                            const tc = lv === -1 ? '#e5e7eb' : heatText[Math.min(lv, 3)];
                            const isToday = isCurrentMonth && d === today;
                            cells.push(
                                <div key={d} style={{
                                    height:'26px', borderRadius:'5px', display:'flex',
                                    alignItems:'center', justifyContent:'center',
                                    background: bg, color: tc,
                                    fontSize:'12px', fontWeight:'900',
                                    fontFamily:"'Noto Sans TC',sans-serif",
                                    outline: isToday ? '2px solid #16a34a' : 'none',
                                    // outline: gold ? '2px solid #f59e0b' : isToday ? '2px solid #16a34a' : 'none', // 註釋：保留原邏輯，未來解開金邊
                                    outlineOffset: '-1px',

            const [movingUser, setMovingUser] = useState(null); // { uid, name }
            const [newTeamName, setNewTeamName] = useState('');
            const [creating, setCreating] = useState(false);
            const [tab, setTab] = useState('teams'); // 'teams' | 'users'

            useEffect(() => {
                const unsubTeams = db.collection('artifacts').doc(appId).collection('teams')

                const unsubUsers = db.collection('artifacts').doc(appId).collection('users')

                return () => { unsubTeams(); unsubUsers(); };
            }, []);

            const deleteTeam = async (team) => {
                const membersInTeam = users.filter(u => u.teamId === team.id);
                if (!window.confirm(`確定刪除「${team.name}」門派？\n${membersInTeam.length > 0 ? `⚠️ 裡面還有 ${membersInTeam.length} 位成員，他們將變成無門派狀態。` : '此門派目前沒有成員。'}`)) return;
                // Clear teamId for all members
                const batch = db.batch();
                membersInTeam.forEach(u => {
                    const ref = db.collection('artifacts').doc(appId).collection('users').doc(u.uid);
                    batch.update(ref, { teamId: firebase.firestore.FieldValue.delete(), teamName: firebase.firestore.FieldValue.delete() });
                });
                batch.delete(db.collection('artifacts').doc(appId).collection('teams').doc(team.id));
                await batch.commit();
            };

            const createTeam = async () => {
                const name = newTeamName.trim();
                if (!name) return;
                setCreating(true);
                await db.collection('artifacts').doc(appId).collection('teams').add({
                    name, createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                setNewTeamName('');
                setCreating(false);
            };

            const moveUserToTeam = async (uid, teamId, teamName) => {
                await db.collection('artifacts').doc(appId).collection('users').doc(uid)
                    .update({ teamId, teamName });
                setMovingUser(null);
            };

            const removeUserFromTeam = async (uid) => {
                if (!window.confirm('確定將此成員移出門派？')) return;
                await db.collection('artifacts').doc(appId).collection('users').doc(uid)
                    .update({ teamId: firebase.firestore.FieldValue.delete(), teamName: firebase.firestore.FieldValue.delete() });
            };

            const teamColors = ['pk-yellow','pk-blue','pk-pink','pk-green','pk-purple','pk-orange'];

            return (
                <div className="space-y-4 animate-in fade-in duration-300">
                    {/* Header */}
                    <div className="p-5 r-card relative overflow-hidden" style={{background:'var(--c-text)'}}>
                        <div className="relative z-10">
                            <h2 className="sans-font text-xl text-white mb-0.5">管理員後台</h2>
                            <p className="text-xs sans-font" style={{color:'rgba(255,255,255,0.5)'}}>門派與成員管理</p>
                        </div>
                        <Icon name="Shield" size={72} className="absolute -bottom-3 -right-2 rotate-12" style={{color:'rgba(255,255,255,0.08)'}} />
                    </div>

                    {/* Sub tabs */}
                    <div className="flex bg-white r-card" style={{border:'1px solid var(--c-border)', padding:'3px'}}>
                        <button onClick={() => setTab('teams')} className={`flex-1 sans-font text-xs r-btn transition-all ${tab === 'teams' ? 'pk-blue' : ''}`}
                            style={{color: tab === 'teams' ? 'var(--c-primary-text)' : 'var(--c-muted)', padding:'6px 0'}}>門派管理</button>
                        <button onClick={() => setTab('users')} className={`flex-1 sans-font text-xs r-btn transition-all ${tab === 'users' ? 'pk-blue' : ''}`}
                            style={{color: tab === 'users' ? 'var(--c-primary-text)' : 'var(--c-muted)', padding:'6px 0'}}>成員管理</button>
                    </div>

                    {/* ── Teams tab ── */}
                    {tab === 'teams' && (
                        <div className="space-y-4">
                            {/* Create team */}
                            <div className="bg-white p-4 r-card card-shadow space-y-3">
                                <p className="sans-font text-xs tracking-widest" style={{color:'var(--c-muted)'}}>新增門派</p>
                                <div className="flex gap-2">
                                    <input
                                        type="text" value={newTeamName}
                                        onChange={e => setNewTeamName(e.target.value)}
                                        onKeyDown={e => e.key === 'Enter' && createTeam()}
                                        placeholder="門派名稱..."
                                        className="flex-1 px-3 py-2 text-sm sans-font focus:outline-none bg-slate-50 r-btn"
                                        style={{border:'1px solid var(--c-border-strong)'}}
                                    />
                                    <button onClick={createTeam} disabled={creating || !newTeamName.trim()}
                                        className="pk-green px-4 py-2 r-btn neo-border-thin sans-font text-sm active-press disabled:opacity-30">
                                        {creating ? '...' : '新增'}
                                    </button>
                                </div>
                            </div>

                            {/* Team list */}
                            {teams.length === 0 && <p className="text-center text-xs sans-font py-4" style={{color:'var(--c-muted)'}}>尚無門派</p>}
                            {teams.map((team, i) => {
                                const memberCount = users.filter(u => u.teamId === team.id).length;
                                const color = teamColors[i % teamColors.length];
                                return (
                                    <div key={team.id} className="bg-white p-4 r-card card-shadow">
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center gap-3">
                                                <div className={`w-9 h-9 ${color} neo-border-thin r-btn flex items-center justify-center`}>
                                                    <Icon name="Sword" size={16} style={{color:'var(--c-text)'}} />
                                                </div>
                                                <div>
                                                    <p className="sans-font text-sm" style={{color:'var(--c-text)'}}>{team.name}</p>
                                                    <p className="text-[10px] sans-font" style={{color:'var(--c-muted)'}}>{memberCount} 位成員</p>
                                                </div>
                                            </div>
                                            <button onClick={() => deleteTeam(team)}
                                                className="w-8 h-8 r-btn flex items-center justify-center active-press hover:bg-red-50"
                                                style={{border:'1px solid var(--c-border)'}}>
                                                <Icon name="Trash2" size={14} style={{color:'var(--c-danger-text)'}} />
                                            </button>
                                        </div>
                                        {memberCount > 0 && (
                                            <div className="mt-3 flex flex-wrap gap-1 pl-12">
                                                {users.filter(u => u.teamId === team.id).map(u => (
                                                    <span key={u.uid} className="text-[10px] bg-slate-100 px-2 py-0.5 r-badge sans-font truncate max-w-[120px]" style={{color:'var(--c-text-sub)'}}>
                                                        {u.displayName || u.email}
                                                    </span>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {/* ── Users tab ── */}
                    {tab === 'users' && (
                        <div className="space-y-3">
                            {loading && <p className="text-center text-xs sans-font py-4" style={{color:'var(--c-muted)'}}>載入中...</p>}
                            {users.map(u => {
                                const teamName = teams.find(t => t.id === u.teamId)?.name;
                                return (
                                    <div key={u.uid} className="bg-white p-4 r-card card-shadow">
                                        <div className="flex items-center justify-between">
                                            <div className="flex-1 min-w-0">
                                                <p className="sans-font text-sm truncate" style={{color:'var(--c-text)'}}>{u.displayName || u.email}</p>
                                                <p className="text-[10px] sans-font truncate" style={{color:'var(--c-muted)'}}>{u.email}</p>
                                                {teamName
                                                    ? <span className="text-[10px] pk-blue px-2 py-0.5 r-badge sans-font mt-1 inline-block" style={{color:'var(--c-primary-text)'}}>{teamName}</span>
                                                    : <span className="text-[10px] px-2 py-0.5 r-badge sans-font mt-1 inline-block" style={{background:'var(--c-danger-bg)',color:'var(--c-danger-text)'}}>無門派</span>
                                                }
                                            </div>
                                            <div className="flex gap-2 ml-2">
                                                <button onClick={() => setMovingUser({ uid: u.uid, name: u.displayName || u.email })}
                                                    className="px-3 py-1.5 bg-slate-100 r-btn text-[10px] sans-font active-press" style={{border:'1px solid var(--c-border)'}}>
                                                    換組
                                                </button>
                                                {u.teamId && (
                                                    <button onClick={() => removeUserFromTeam(u.uid)}
                                                        className="w-8 h-8 r-btn flex items-center justify-center active-press"
                                                        style={{background:'var(--c-danger-bg)',border:'1px solid var(--c-danger)'}}>
                                                        <Icon name="UserMinus" size={13} style={{color:'var(--c-danger-text)'}} />
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {/* Move user modal */}
                    {movingUser && (
                        <div className="fixed inset-0 z-50 flex items-end justify-center overlay-blur p-5">
                            <div className="w-full max-w-sm bg-white r-card neo-border neo-shadow p-5 space-y-3">
                                <div className="flex items-center justify-between">
                                    <p className="sans-font text-sm" style={{color:'var(--c-text)'}}>將 <span style={{color:'var(--c-primary-text)'}}>{movingUser.name}</span> 移至...</p>
                                    <button onClick={() => setMovingUser(null)} style={{color:'var(--c-muted)'}}><Icon name="X" size={18} /></button>
                                </div>
                                <div className="space-y-2 max-h-64 overflow-y-auto">
                                    {teams.map((team, i) => (
                                        <button key={team.id} onClick={() => moveUserToTeam(movingUser.uid, team.id, team.name)}
                                            className="w-full flex items-center gap-3 p-3 r-card active-press hover:bg-slate-50" style={{border:'1px solid var(--c-border)'}}>
                                            <div className={`w-7 h-7 ${teamColors[i % teamColors.length]} r-btn flex items-center justify-center neo-border-thin`}>
                                                <Icon name="Sword" size={13} />
                                            </div>
                                            <span className="sans-font text-sm" style={{color:'var(--c-text)'}}>{team.name}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const NavIcons = {
            mountain: (
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M3 20l7-12 4 6 2-3 5 9H3z" />
                </svg>
            ),
            scroll: (
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M4 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6" />
                    <path d="M4 18a2 2 0 0 0 2 2" />
                    <path d="M4 4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2" />
                    <line x1="9" y1="7" x2="15" y2="7" />
                    <line x1="9" y1="11" x2="15" y2="11" />
                    <line x1="9" y1="15" x2="13" y2="15" />
                </svg>
            ),
            hourglass: (
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M5 2h14" />
                    <path d="M5 22h14" />
                    <path d="M5 2l7 9-7 11" />
                    <path d="M19 2l-7 9 7 11" />
                    <line x1="8" y1="18" x2="16" y2="18" />
                </svg>
            ),
            milestone: (
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M5 3v18" />
                    <path d="M5 5h12l-3 4 3 4H5" />
                </svg>
            ),
            gate: (
                <svg width="22" height="22" viewBox="0 0 26 26" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M4 23V13a9 9 0 0 1 18 0v10" />
                    <line x1="2" y1="23" x2="24" y2="23" />
                    <path d="M10 23v-7a3 3 0 0 1 6 0v7" />
                    <circle cx="13" cy="14" r="1" fill="currentColor" stroke="none" />
                </svg>
            ),
        };

        const NavBtn = ({ active, onClick, navIcon, label }) => (
            <button onClick={onClick} className={`flex flex-col items-center px-4 py-1 r-btn transition-all relative ${active ? '' : ''}`}
                style={{color: active ? 'var(--c-primary-text)' : 'var(--c-muted)'}}>
                {active && <span style={{position:'absolute',bottom:0,left:'50%',transform:'translateX(-50%)',width:'20px',height:'3px',background:'var(--c-primary)',borderRadius:'2px 2px 0 0'}}></span>}
                <span className="inline-flex items-center justify-center" style={{transform:'scale(0.85)'}}>
                    {NavIcons[navIcon]}
                </span>
                <span className="text-[9px] sans-font" style={{marginTop:'1px'}}>{label}</span>
            </button>
        );

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
