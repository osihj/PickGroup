<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>抽籤分組工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        html { scroll-behavior: smooth; touch-action: manipulation; -webkit-text-size-adjust: 100%; }
        body { font-family: 'Inter', 'Microsoft JhengHei', sans-serif; background-color: #f8fafc; color: #334155; }
        .neubrutalism { border: 2px solid #475569; box-shadow: 4px 4px 0px 0px rgba(71, 85, 105, 0.1); }
        .card-result { border: 2px solid #475569; box-shadow: 4px 4px 0px 0px rgba(71, 85, 105, 0.1); }
        .card-active { background-color: #ffffff; border: 2px solid #475569; color: #334155; }
        .card-leader { background-color: #fef3c7; border: 2px solid #d97706; color: #92400e; }
        .card-inactive { background-color: #f1f5f9; border: 2px solid #e2e8f0; color: #94a3b8; text-decoration: line-through; opacity: 0.7; }
        @keyframes btnFlash { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .btn-loading { animation: btnFlash 0.5s ease-in-out infinite; pointer-events: none; }
        .btn-stepper { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: white; border: 2px solid #e2e8f0; border-radius: 10px; font-weight: 900; }
        .stat-tag { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 900; }
        .btn-aux { flex: 1; font-size: 12px; font-weight: 900; padding: 8px 0; border-radius: 10px; border: 2px solid #e2e8f0; background: white; color: #64748b; }

        /* 三欄固定等寬，不讓內容撐開 */
        #memberList {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
        }
        #memberList > div {
            min-width: 0; /* 關鍵：防止 grid item 被內容撐開 */
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body class="p-4 md:p-10 pb-20">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl md:text-4xl font-black text-slate-800 tracking-tight">抽籤分組工具 <span class="text-blue-500">.</span></h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
            <div class="lg:col-span-5 space-y-6">
                <div class="space-y-3">
                    <textarea id="inputContent" rows="4" placeholder="貼上名單（支援換行、空格、逗號、頓號混合）..." class="w-full p-4 border-2 border-slate-200 rounded-2xl focus:border-blue-400 focus:outline-none transition resize-none text-sm bg-white neubrutalism"></textarea>
                    <button onclick="addMembers()" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl hover:bg-slate-700 transition active:scale-[0.98]">匯入名單</button>
                    <div class="flex gap-2">
                        <button onclick="toggleAll(true)" class="btn-aux">全選</button>
                        <button onclick="toggleAll(false)" class="btn-aux">取消</button>
                        <button onclick="clearStorage()" class="btn-aux text-red-500 border-red-50">清除名單</button>
                    </div>
                </div>
                
                <div class="bg-white p-4 rounded-2xl border-2 border-slate-100 space-y-4">
                    <div class="flex flex-wrap gap-2 pb-2 border-b-2 border-slate-50">
                        <div class="stat-tag bg-slate-100 text-slate-600">總名單 <span id="statAll">0</span></div>
                        <div class="stat-tag bg-blue-50 text-blue-600">總計 <span id="statTotal">0</span></div>
                        <div class="stat-tag bg-amber-50 text-amber-600">★ <span id="statStar">0</span></div>
                        <div class="stat-tag bg-slate-50 text-slate-400">餘 <span id="statOthers">0</span></div>
                    </div>
                    <div id="memberList" class="max-h-[500px] overflow-y-auto pr-1"></div>
                </div>
            </div>

            <div class="lg:col-span-7 space-y-6">
                <div class="bg-white p-4 md:p-5 rounded-2xl neubrutalism flex flex-col sm:flex-row items-stretch gap-4">
                    <div class="flex items-center justify-between bg-slate-50 p-2 px-5 rounded-xl border-2 border-slate-100 flex-1">
                        <span class="text-sm font-bold text-slate-500">組數</span>
                        <div class="flex items-center gap-4">
                            <button onclick="changeGroupCount(-1)" class="btn-stepper">－</button>
                            <input id="groupCount" type="number" value="2" readonly class="w-10 bg-transparent font-black text-2xl text-slate-800 text-center">
                            <button onclick="changeGroupCount(1)" class="btn-stepper">＋</button>
                        </div>
                    </div>
                    <button id="btnShuffle" onclick="shuffleAndGroup()" class="flex-[1.5] bg-blue-500 text-white font-black py-4 rounded-xl text-lg transition-all active:scale-[0.98]">開始分組</button>
                </div>
                <div id="resultArea" class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-6"></div>
            </div>
        </div>
    </div>

    <script>
        let members = JSON.parse(localStorage.getItem('my_group_tool_v24') || '[]');

        function save() { localStorage.setItem('my_group_tool_v24', JSON.stringify(members)); render(); }
        
        function addMembers() {
            const input = document.getElementById('inputContent').value;
            if (!input.trim()) return;
            
            // 修正：加入「、」（日文/中文頓號）作為分隔符號
            const lines = input.split(/\n/);
            lines.forEach(line => {
                if (!line.trim()) return;
                // 分隔符號加入「、」
                const items = line.split(/[,，\s\t　;；、]+/);
                items.forEach(item => {
                    let cleanName = item.trim();
                    // 移除開頭的編號（如 1. 2. 或 1、）
                    cleanName = cleanName.replace(/^[\d\s\.\-、]+/, '').trim();
                    
                    if (cleanName && !members.some(m => m.name === cleanName)) {
                        members.push({ name: cleanName, present: true, isLeader: false });
                    }
                });
            });
            document.getElementById('inputContent').value = '';
            save();
        }

        function render() {
            const list = document.getElementById('memberList');
            if (members.length === 0) {
                list.style.display = 'block';
                list.innerHTML = '<div class="w-full py-10 text-center text-slate-300 italic text-sm">請匯入名單</div>';
            } else {
                list.style.display = 'grid';
                list.innerHTML = '';
            }
            
            let totalActive = 0, starCount = 0;
            members.forEach((m, idx) => {
                if(m.present) { totalActive++; if(m.isLeader) starCount++; }
                const div = document.createElement('div');
                // 卡片：固定排版，文字不換行，超出截斷
                div.className = `${m.present ? (m.isLeader ? 'card-leader' : 'card-active') : 'card-inactive'} px-2 py-2 rounded-lg cursor-pointer font-bold text-[13px] flex items-center justify-between transition-all`;
                div.style.cssText = 'min-width:0; width:100%; overflow:hidden;';
                div.onclick = () => { members[idx].present = !members[idx].present; save(); };
                div.innerHTML = `
                    <div class="flex items-center gap-1 overflow-hidden" style="min-width:0; flex:1;">
                        <span class="flex-shrink-0 ${m.isLeader ? 'text-amber-600' : 'text-slate-300'}" onclick="event.stopPropagation(); members[${idx}].isLeader = !members[${idx}].isLeader; save();">★</span>
                        <span class="truncate" style="display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${m.name}</span>
                    </div>
                    <span class="flex-shrink-0 text-slate-300 hover:text-red-400 font-black px-0.5" onclick="event.stopPropagation(); members.splice(${idx}, 1); save();">×</span>
                `;
                list.appendChild(div);
            });
            
            document.getElementById('statAll').innerText = members.length;
            document.getElementById('statTotal').innerText = totalActive;
            document.getElementById('statStar').innerText = starCount;
            document.getElementById('statOthers').innerText = totalActive - starCount;
        }

        function changeGroupCount(val) {
            const input = document.getElementById('groupCount');
            let current = parseInt(input.value);
            if (current + val >= 1) input.value = current + val;
        }

        function shuffleAndGroup() {
            const activeOnes = members.filter(m => m.present);
            const count = parseInt(document.getElementById('groupCount').value);
            if (activeOnes.length === 0) return alert('請先選取名單');
            
            const btn = document.getElementById('btnShuffle');
            btn.classList.add('btn-loading');
            
            setTimeout(() => {
                const leaders = activeOnes.filter(m => m.isLeader).sort(() => Math.random() - 0.5);
                const regulars = activeOnes.filter(m => !m.isLeader).sort(() => Math.random() - 0.5);
                
                let groups = Array.from({ length: Math.min(count, activeOnes.length) }, (_, i) => ({ id: i + 1, members: [] }));
                leaders.forEach((m, i) => groups[i % groups.length].members.push({ name: m.name, isLeader: true }));
                regulars.forEach((m, i) => groups[(leaders.length + i) % groups.length].members.push({ name: m.name, isLeader: false }));
                
                const area = document.getElementById('resultArea');
                area.innerHTML = '';
                groups.forEach(g => {
                    const div = document.createElement('div');
                    div.className = 'bg-white p-5 rounded-2xl card-result flex flex-col';
                    div.innerHTML = `<div class="font-black text-xl mb-4 text-slate-800">第 ${g.id} 組</div>
                        <div class="space-y-1 border-t-2 border-slate-50 pt-4">
                            ${g.members.map(m => `<div class="font-bold ${m.isLeader ? 'text-amber-600' : 'text-slate-600'}">${m.isLeader ? '★' : '·'} ${m.name}</div>`).join('')}
                        </div>`;
                    area.appendChild(div);
                });
                btn.classList.remove('btn-loading');
                area.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 800);
        }

        function toggleAll(val) { members.forEach(m => m.present = val); save(); }
        function clearStorage() { if(confirm('確定要清空所有名單嗎？')) { members = []; save(); document.getElementById('resultArea').innerHTML = ''; } }

        render();
    </script>
</body>
</html>
