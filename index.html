    <style type="text/tailwindcss">
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

        /* ── Design Tokens ──────────────────────────────── */
        :root {
            /* 色彩系統：主色 / 輔色 / 強調 */
            --c-primary:   #74c0fc;   /* 藍：主要動作、active 狀態 */
            --c-primary-bg: #e0f2fe;
            --c-primary-text: #0e4f7a;
            --c-accent:    #ffd43b;   /* 黃：練功、高亮行動 */
            --c-accent-bg: #fef9c3;
            --c-accent-text: #6b4f00;
            --c-danger:    #ff8787;   /* 紅：危險、清除 */
            --c-danger-bg: #fff0f0;
            --c-danger-text: #9b1c1c;
            --c-success:   #8ce99a;   /* 綠：成功、完成 */
            --c-muted:     #9ca3af;   /* 次要文字 */
            --c-border:    #e5e7eb;   /* 通用邊框 */
            --c-border-strong: #d1d5db;
            --c-surface:   #f8fafc;   /* 頁面背景 */
            --c-card:      #ffffff;
            --c-text:      #1f2937;
            --c-text-sub:  #6b7280;
            /* 圓角系統：3 個 token */
            --r-badge: 6px;
            --r-btn:   10px;
            --r-card:  16px;
            /* 間距基準 */
            --sp-page: 24px;
            --sp-card: 20px;
            --sp-gap:  16px;
        }

        @layer utilities {
            /* 邊框：僅用於 CTA 主按鈕保留 neo 風格 */
            .neo-border       { @apply border-2 border-[#374151]; }
            .neo-border-thin  { border: 1px solid var(--c-border-strong); }
            /* neo-shadow：僅用於主要 CTA */
            .neo-shadow       { box-shadow: 4px 4px 0px 0px #374151; }
            .neo-shadow-sm    { box-shadow: 2px 2px 0px 0px #374151; }
            /* 一般卡片陰影：柔和 */
            .card-shadow      { box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 0 0 1px var(--c-border); }
            /* 按壓動畫 */
            .active-press     { @apply active:translate-x-[1px] active:translate-y-[1px] active:shadow-none transition-all duration-100; }
            .overlay-blur     { backdrop-filter: blur(8px); background-color: rgba(31,41,55,0.45); }
            .sans-font        { font-family: 'Noto Sans TC', sans-serif; font-weight: 900; }
            .sans-normal      { font-family: 'Noto Sans TC', sans-serif; font-weight: 400; }
            .float-anim       { animation: float 3s ease-in-out infinite; }
            @keyframes float  { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

            /* 統一色塊 — 主色 / 輔色 / 強調 */
            .pk-blue   { background-color: var(--c-primary); }
            .pk-yellow { background-color: var(--c-accent); }
            .pk-pink   { background-color: var(--c-danger); }
            .pk-green  { background-color: var(--c-success); }
            .pk-purple { background-color: #b197fc; }
            .pk-orange { background-color: #ff922b; }

            /* 邊框色塊 — 統一淺底 */
            .pk-border-blue   { border-color: var(--c-primary) !important; background-color: var(--c-primary-bg); }
            .pk-border-yellow { border-color: var(--c-accent) !important; background-color: var(--c-accent-bg); }
            .pk-border-pink   { border-color: var(--c-danger) !important; background-color: var(--c-danger-bg); }
            .pk-border-green  { border-color: var(--c-success) !important; background-color: #f0fdf4; }
            .pk-border-purple { border-color: #b197fc !important; background-color: #faf5ff; }
            .pk-border-orange { border-color: #ff922b !important; background-color: #fff7ed; }

            /* 主標題卡片：純白底，不用漸層 */
            .vibrant-card { background: var(--c-card); border: 1px solid var(--c-border); }

            /* 圓角 utilities — 對應 token */
            .r-badge { border-radius: var(--r-badge); }
            .r-btn   { border-radius: var(--r-btn); }
            .r-card  { border-radius: var(--r-card); }
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--c-surface);
            color: var(--c-text);
            -webkit-font-smoothing: antialiased;
        }

        /* 字體層級：語意化顏色，不用 opacity */
        .text-primary   { color: var(--c-text); }
        .text-secondary { color: var(--c-text-sub); }
        .text-muted     { color: var(--c-muted); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const firebaseConfig = {
            apiKey: "AIzaSyAdCP5BvvIhcjYt2_Re80JKKDKqfbgjtvk",
            authDomain: "drum-8d969.firebaseapp.com",
            projectId: "drum-8d969",
            storageBucket: "drum-8d969.firebasestorage.app",
            messagingSenderId: "28100257204",
            appId: "1:28100257204:web:2d787ad57171b2d820fee1",
            measurementId: "G-NLXPNWL0RS"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "discipline-app-v15";
        const ADMIN_EMAIL = "hsinglinstar@gmail.com";

        const formatDateKey = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };

        const getWeekDays = (baseDate = new Date()) => {
            const start = new Date(baseDate);
            const day = start.getDay();
            const diff = start.getDate() - day;
            start.setDate(diff);
            start.setHours(0,0,0,0);
            return Array.from({ length: 7 }, (_, i) => {
                const d = new Date(start);
                d.setDate(start.getDate() + i);
                return d;
            });
        };

        const calcScore = (logs) => {
            const now = new Date();
            const prefix = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            let mActiveDays = 0, mExMins = 0, mStretchMins = 0, mPracCount = 0;
            Object.entries(logs || {}).forEach(([key, val]) => {
                if (key.startsWith(prefix)) {
                    const p = val.practice || 0, e = val.exerciseTime || 0, s = val.stretchTime || 0;
                    if ((p + e + s + (val.fiveMin || 0)) > 0) mActiveDays++;
                    mExMins += e; mStretchMins += s; mPracCount += p;
                }
            });
            const totalHours = (mExMins + mStretchMins) / 60;
            return Math.round((mActiveDays * 10) + totalHours + (mPracCount * 5));
        };

        // All-time score for level calculation (never resets)
        const calcAllTimeScore = (logs) => {
            let activeDays = 0, exMins = 0, stretchMins = 0, pracCount = 0;
            Object.entries(logs || {}).forEach(([key, val]) => {
                const p = val.practice || 0, e = val.exerciseTime || 0, s = val.stretchTime || 0;
                if ((p + e + s + (val.fiveMin || 0)) > 0) activeDays++;
                exMins += e; stretchMins += s; pracCount += p;
            });
            const totalHours = (exMins + stretchMins) / 60;
            return Math.round((activeDays * 10) + totalHours + (pracCount * 5));
        };

        const calcLevel = (allTimeScore) => {
            let realm = { level: 1 };
            if (allTimeScore >= 600) realm = { level: 90 };
            else if (allTimeScore >= 350) realm = { level: 70 };
            else if (allTimeScore >= 150) realm = { level: 30 };
            else if (allTimeScore >= 50) realm = { level: 10 };
            let displayLevel = realm.level + Math.floor((allTimeScore % 100) / 10);
            if (allTimeScore >= 600) displayLevel = 90 + Math.min(9, Math.floor((allTimeScore - 600) / 50));
            return displayLevel;
        };

        const Icon = ({ name, size = 24, className = "", strokeWidth = 3 }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    ref.current.innerHTML = '';
                    const icon = window.lucide.icons[name];
                    if (icon) {
                        const el = window.lucide.createElement(icon);
                        el.setAttribute('width', size);
                        el.setAttribute('height', size);
                        el.setAttribute('stroke-width', strokeWidth);
                        ref.current.appendChild(el);
                    }
                }
            }, [name, size, strokeWidth]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        // ─── Login Screen ──────────────────────────────────────────────
        const LoginScreen = ({ onLogin }) => {
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleGoogleLogin = async () => {
                setLoading(true);
                setError('');
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    await auth.signInWithPopup(provider);
                } catch (popupError) {
                    // popup blocked, fallback to redirect
                    if (popupError.code === 'auth/popup-blocked' || popupError.code === 'auth/popup-closed-by-user') {
                        try {
                            await auth.signInWithRedirect(provider);
                        } catch (e) {
                            setError('登入失敗，請再試一次');
                            setLoading(false);
                        }
                    } else {
                        setError('登入失敗：' + popupError.message);
                        setLoading(false);
                    }
                }
            };

            useEffect(() => {
                auth.getRedirectResult().then(result => {
                    if (result?.user) setLoading(false);
                }).catch(() => setLoading(false));
            }, []);

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col items-center justify-center p-8 gap-10">
                    <div className="text-center space-y-3">
                        <div className="w-20 h-20 pk-blue neo-border r-card flex items-center justify-center mx-auto neo-shadow float-anim">
                            <Icon name="Star" size={40} className="text-white" />
                        </div>
                        <h1 className="sans-font text-4xl tracking-tighter" style={{color:'var(--c-text)'}}>自律動起來</h1>
                        <p className="text-sm sans-font" style={{color:'var(--c-muted)'}}>知行合一 · 同道齊歡</p>
                    </div>

                    <div className="w-full bg-white p-6 r-card card-shadow space-y-4">
                        <p className="sans-font text-center text-xs tracking-widest" style={{color:'var(--c-text-sub)'}}>以 Google 帳號登入，加入陣營</p>
                        <button
                            onClick={handleGoogleLogin}
                            disabled={loading}
                            className="w-full flex items-center justify-center gap-3 bg-white r-btn py-3.5 active-press hover:bg-slate-50 transition-colors neo-border neo-shadow-sm"
                        >
                            <svg width="22" height="22" viewBox="0 0 48 48">
                                <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
                                <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
                                <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
                                <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
                            </svg>
                            <span className="sans-font text-base" style={{color:'var(--c-text)'}}>{loading ? '登入中...' : '使用 Google 登入'}</span>
                        </button>
                        {error && <p className="text-center text-xs sans-font" style={{color:'var(--c-danger-text)'}}>{error}</p>}
                    </div>
                </div>
            );
        };

        // ─── Team Selection Screen ──────────────────────────────────────
        const TeamSelectScreen = ({ user, onJoinTeam, existingName }) => {
            const [teams, setTeams] = useState([]);
            const [newTeamName, setNewTeamName] = useState('');
            const [loading, setLoading] = useState(false);
            const [creating, setCreating] = useState(false);
            // 若 Firestore 已有 displayName（舊用戶），直接跳到陣營選擇
            const [step, setStep] = useState(existingName ? 'team' : 'name');
            const [customName, setCustomName] = useState(existingName || '');
            const nameInputRef = React.useRef(null);

            useEffect(() => {
                if (step === 'name' && nameInputRef.current) nameInputRef.current.focus();
            }, [step]);

            useEffect(() => {
                const unsub = db.collection('artifacts').doc(appId).collection('teams')
                    .onSnapshot(snap => {
                        const list = [];
                        snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                        setTeams(list);
                    });
                return () => unsub();
            }, []);

            const confirmName = () => {
                if (customName.trim()) setStep('team');
            };

            const joinTeam = async (teamId, teamName) => {
                setLoading(true);
                await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).set({
                    teamId, teamName,
                    displayName: customName.trim() || user.displayName || user.email,
                    email: user.email,
                    photoURL: user.photoURL || '',
                }, { merge: true });
                onJoinTeam(teamId, teamName);
            };

            const createTeam = async () => {
                const name = newTeamName.trim();
                if (!name) return;
                setCreating(true);
                const ref = db.collection('artifacts').doc(appId).collection('teams').doc();
                await ref.set({ name, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                await joinTeam(ref.id, name);
            };

            // ── Step 1: 名號設定 ──
            if (step === 'name') return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col items-center justify-center p-6 gap-8">
                    {/* 頭像 */}
                    <div style={{position:'relative'}}>
                        {user.photoURL ? (
                            <img src={user.photoURL} alt="avatar"
                                style={{width:'80px', height:'80px', borderRadius:'50%', objectFit:'cover', border:'2px solid #e9ecef'}} />
                        ) : (
                            <div style={{width:'80px', height:'80px', borderRadius:'50%', background:'#e9ecef', display:'flex', alignItems:'center', justifyContent:'center'}}>
                                <Icon name="User" size={36} style={{color:'#9ca3af'}} />
                            </div>
                        )}
                    </div>

                    {/* 歡迎文字 */}
                    <div style={{textAlign:'center'}}>
                        <p className="sans-font" style={{fontSize:'12px', color:'#9ca3af', letterSpacing:'0.08em', marginBottom:'8px'}}>歡迎加入自律動起來</p>
                        <h2 className="sans-font" style={{fontSize:'26px', fontWeight:'500', color:'#374151', lineHeight:1.2}}>閣下，請賜名號</h2>
                    </div>

                    {/* 名號輸入 */}
                    <div style={{width:'100%'}}>
                        <div style={{background:'#fff', border:'1.5px solid #e9ecef', borderRadius:'14px', padding:'16px 18px', marginBottom:'12px'}}>
                            <p className="sans-font" style={{fontSize:'11px', color:'#9ca3af', marginBottom:'8px'}}>閣下：</p>
                            <input
                                ref={nameInputRef}
                                type="text"
                                value={customName}
                                onChange={e => setCustomName(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && confirmName()}
                                placeholder="請輸入您的名號..."
                                className="sans-font"
                                style={{
                                    width:'100%', border:'none', outline:'none',
                                    fontSize:'20px', color:'#374151',
                                    background:'transparent',
                                    fontFamily:"'Noto Sans TC', sans-serif"
                                }}
                            />
                        </div>
                        <button
                            onClick={confirmName}
                            disabled={!customName.trim()}
                            className="w-full sans-font active-press"
                            style={{
                                background: customName.trim() ? '#374151' : '#e9ecef',
                                color: customName.trim() ? '#fff' : '#9ca3af',
                                border:'none', borderRadius:'12px',
                                padding:'16px', fontSize:'16px', fontWeight:'500',
                                transition:'all 0.2s', cursor: customName.trim() ? 'pointer' : 'default'
                            }}>
                            確認名號，前往選擇陣營
                        </button>
                    </div>
                </div>
            );

            // ── Step 2: 選擇陣營 ──
            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col p-6 gap-6">
                    <div className="text-center pt-10 pb-4">
                        <div className="w-16 h-16 pk-purple neo-border r-card flex items-center justify-center mx-auto mb-3 neo-shadow">
                            <Icon name="Users" size={32} className="text-white" />
                        </div>
                        <h2 className="sans-font text-3xl tracking-tighter" style={{color:'var(--c-text)'}}>選擇陣營</h2>
                        <p className="text-xs sans-font mt-1" style={{color:'var(--c-muted)'}}>
                            <span style={{color:'#374151', fontWeight:'500'}}>{customName}</span>，加入或創建你的修煉門派
                        </p>
                    </div>

                    {/* Existing teams */}
                    <div className="space-y-3">
                        {teams.length === 0 && (
                            <p className="text-center text-xs opacity-30 sans-font py-4">還沒有門派，成為第一個創立者！</p>
                        )}
                        {teams.map(t => (
                            <button key={t.id} onClick={() => joinTeam(t.id, t.name)}
                                className="w-full bg-white p-4 r-card card-shadow flex items-center justify-between active-press hover:bg-slate-50">
                                <div className="flex items-center gap-3">
                                    <div className="w-9 h-9 pk-yellow neo-border-thin r-btn flex items-center justify-center">
                                        <Icon name="Sword" size={16} className="text-[#374151]" />
                                    </div>
                                    <span className="sans-font text-base" style={{color:'var(--c-text)'}}>{t.name}</span>
                                </div>
                                <Icon name="ChevronRight" size={18} style={{color:'var(--c-muted)'}} />
                            </button>
                        ))}
                    </div>

                    {/* Create new team */}
                    <div className="bg-white p-5 r-card card-shadow space-y-3">
                        <p className="sans-font text-xs tracking-widest" style={{color:'var(--c-muted)'}}>創建新門派</p>
                        <input
                            type="text"
                            value={newTeamName}
                            onChange={e => setNewTeamName(e.target.value)}
                            onKeyDown={e => e.key === 'Enter' && createTeam()}
                            placeholder="輸入門派名稱..."
                            className="w-full px-4 py-2.5 text-sm sans-font focus:outline-none bg-slate-50 neo-border-thin r-btn"
                            style={{border:'1px solid var(--c-border-strong)'}}
                        />
                        <button onClick={createTeam} disabled={creating || !newTeamName.trim()}
                            className="w-full pk-green py-3 r-btn neo-border sans-font text-base active-press disabled:opacity-30 neo-shadow-sm">
                            {creating ? '創立中...' : '創立門派'}
                        </button>
                    </div>

                    {/* 返回修改名號 */}
                    <button onClick={() => setStep('name')} className="sans-font text-center w-full"
                        style={{fontSize:'12px', color:'#9ca3af', background:'none', border:'none', padding:'4px'}}>
                        ← 修改名號
                    </button>
                </div>
            );
        };

        // ─── Leaderboard View ───────────────────────────────────────────
        const LeaderboardView = ({ currentUser, userTeamId }) => {
            const [leaderboard, setLeaderboard] = useState([]);
            const [allMembers, setAllMembers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [lbTab, setLbTab] = useState('teams'); // 'teams' | 'members'

            // calc active days this month from logs
            const calcActiveDays = (logs) => {
                const now = new Date();
                const prefix = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
                return Object.entries(logs).filter(([k,v]) =>
                    k.startsWith(prefix) && ((v.practice||0)+(v.fiveMin||0)+(v.exerciseTime||0)+(v.stretchTime||0)) > 0
                ).length;
            };

            useEffect(() => {
                const unsubTeams = db.collection('artifacts').doc(appId).collection('teams')
                    .onSnapshot(async teamSnap => {
                        const teams = {};
                        teamSnap.forEach(doc => { teams[doc.id] = { id: doc.id, name: doc.data().name, members: [] }; });

                        const usersSnap = await db.collection('artifacts').doc(appId).collection('users').get();
                        const userPromises = [];
                        const membersFlat = [];

                        usersSnap.forEach(userDoc => {
                            const userData = userDoc.data();
                            if (userData.teamId && teams[userData.teamId]) {
                                const uid = userDoc.id;
                                userPromises.push(
                                    db.collection('artifacts').doc(appId).collection('users').doc(uid)
                                        .collection('dailyLogs').get()
                                        .then(logsSnap => {
                                            const logs = {};
                                            logsSnap.forEach(d => logs[d.id] = d.data());
                                            const score = calcScore(logs);
                                            const lv = calcLevel(calcAllTimeScore(logs));
                                            const activeDays = calcActiveDays(logs);
                                            const member = {
                                                uid,
                                                name: userData.displayName || userData.email,
                                                teamId: userData.teamId,
                                                teamName: teams[userData.teamId]?.name || '',
                                                score, lv, activeDays
                                            };
                                            teams[userData.teamId].members.push(member);
                                            membersFlat.push(member);
                                        })
                                );
                            }
                        });
                        await Promise.all(userPromises);

                        const result = Object.values(teams).map(t => {
                            const total = t.members.reduce((s, m) => s + m.score, 0);
                            const avg = t.members.length ? Math.round(total / t.members.length) : 0;
                            const avgLv = t.members.length ? Math.round(t.members.reduce((s, m) => s + m.lv, 0) / t.members.length) : 0;
                            return { ...t, total, avg, avgLv };
                        }).sort((a, b) => b.avgLv - a.avgLv);

                        setLeaderboard(result);
                        setAllMembers(membersFlat.sort((a, b) => b.lv - a.lv));
                        setLoading(false);
                    });
                return () => unsubTeams();
            }, []);

            const teamAccentColors = ['#ffd43b','#74c0fc','#ff8787','#8ce99a','#b197fc','#ff922b'];



            return (
                <div className="space-y-4 animate-in fade-in duration-300" style={{paddingBottom:'2rem'}}>
                    {/* Header */}
                    <div className="vibrant-card p-5 r-card float-anim relative overflow-hidden" style={{boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
                        <div className="relative z-10">
                            <h2 className="sans-font text-2xl mb-1" style={{color:'var(--c-text)'}}>風雲榜</h2>
                            <p className="text-[10px] sans-font" style={{color:'var(--c-muted)'}}>陣營同心，共修道行</p>
                        </div>
                    </div>

                    {/* Tab switcher */}
                    <div className="flex bg-white r-card" style={{border:'1px solid var(--c-border)', padding:'3px'}}>
                        <button onClick={() => setLbTab('teams')}
                            className={`flex-1 sans-font text-xs r-btn transition-all ${lbTab==='teams' ? 'pk-blue' : ''}`}
                            style={{color: lbTab==='teams' ? 'var(--c-primary-text)' : 'var(--c-muted)', padding:'6px 0'}}>
                            陣營
                        </button>
                        <button onClick={() => setLbTab('members')}
                            className={`flex-1 sans-font text-xs r-btn transition-all ${lbTab==='members' ? 'pk-blue' : ''}`}
                            style={{color: lbTab==='members' ? 'var(--c-primary-text)' : 'var(--c-muted)', padding:'6px 0'}}>
                            成員
                        </button>
                    </div>

                    {loading && <div className="text-center py-12 opacity-30 sans-font text-sm">載入中...</div>}

                    {/* ── 門派排名 tab ── */}
                    {!loading && lbTab === 'teams' && (
                        <div className="space-y-3">
                            {leaderboard.length === 0 && <div className="text-center py-12 opacity-30 sans-font text-sm">還沒有門派資料</div>}
                            {leaderboard.map((team, i) => {
                                const isMyTeam = team.id === userTeamId;
                                const accentColor = teamAccentColors[i % teamAccentColors.length];
                                const visibleMembers = team.members
                                    .sort((a,b) => b.lv - a.lv);
                                return (
                                    <div key={team.id} className="bg-white rounded-[1.5rem] overflow-hidden"
                                        style={{border:`1.5px solid ${accentColor}`, padding:'16px 18px'}}>
                                        {/* Team header */}
                                        <div className="flex items-start justify-between mb-3">
                                            <div className="flex items-center gap-2">
                                                <div>
                                                    <p className="sans-font text-base" style={{color:'#374151'}}>{team.name}</p>
                                                </div>
                                                {isMyTeam && <span className="text-[10px] pk-blue px-2 py-0.5 rounded-full sans-font ml-1" style={{color:'var(--c-primary-text)'}}>我的陣營</span>}
                                            </div>
                                            <div className="flex items-stretch gap-2">
                                                <div className="rounded-xl text-center flex flex-col items-center justify-center" style={{padding:'10px 12px', minWidth:'58px', background:`${accentColor}18`, border:`1px solid ${accentColor}60`}}>
                                                    <div className="sans-font text-lg" style={{lineHeight:'1.2', color:'#374151'}}>{team.total}</div>
                                                    <div className="sans-font" style={{fontSize:'9px', color:'#9ca3af'}}>總點</div>
                                                </div>
                                                <div className="rounded-xl text-center flex flex-col items-center justify-center" style={{padding:'10px 12px', minWidth:'58px', background:`${accentColor}18`, border:`1px solid ${accentColor}60`}}>
                                                    <div className="sans-font text-lg" style={{lineHeight:'1.2', color:'#374151'}}>{team.avg}</div>
                                                    <div className="sans-font" style={{fontSize:'9px', color:'#9ca3af'}}>均值</div>
                                                </div>
                                            </div>
                                        </div>
                                        {/* Members mini list — hide self */}
                                        {visibleMembers.length > 0 && (
                                            <div style={{borderTop:'0.5px solid #f3f4f6', paddingTop:'8px'}}>
                                                {visibleMembers.map((m, mi) => (
                                                    <div key={m.uid} className="flex items-center justify-between" style={{padding:'5px 4px'}}>
                                                        <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
                                                            <span className="sans-font" style={{fontSize:'11px', color:'#d1d5db', width:'14px'}}>{mi+1}</span>
                                                            <span className="sans-font text-sm" style={{color:'#374151'}}>{m.name}</span>
                                                            <span className="sans-font" style={{fontSize:'11px', color:'#9ca3af'}}>Lv.{m.lv}</span>
                                                        </div>
                                                        <span className="sans-font text-xs" style={{color:'#6b7280'}}>{m.score} 點</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {/* ── 門派成員 tab ── */}
                    {!loading && lbTab === 'members' && (
                        <div className="space-y-2">
                            {allMembers.length === 0 && <div className="text-center py-12 opacity-30 sans-font text-sm">還沒有成員資料</div>}
                            {allMembers.map((m, i) => {
                                const isMe = m.uid === currentUser?.uid;
                                // find team color
                                const teamIdx = leaderboard.findIndex(t => t.id === m.teamId);
                                const accentColor = teamAccentColors[teamIdx >= 0 ? teamIdx % teamAccentColors.length : 0];
                                return (
                                    <div key={m.uid} className="bg-white r-card flex items-center gap-3"
                                        style={{padding:'12px 16px', border: isMe ? '1.5px solid var(--c-primary)' : '1px solid var(--c-border)',
                                            boxShadow: isMe ? '0 0 0 3px rgba(116,192,252,0.15)' : '0 1px 3px rgba(0,0,0,0.04)'}}>
                                        {/* Name + team badge */}
                                        <div style={{flex:1, minWidth:0}}>
                                            <div className="flex items-center gap-2 flex-wrap">
                                                <span className="sans-font text-sm" style={{color:'#1f2937'}}>{m.name}</span>
                                                <span className="sans-font" style={{fontSize:'9px', padding:'1px 7px', borderRadius:'99px', background:`${accentColor}28`, color: accentColor === '#ffd43b' ? '#6b4f00' : '#374151', border:`1px solid ${accentColor}60`}}>
                                                    {m.teamName}
                                                </span>
                                            </div>
                                            {/* Progress bar: active days / 30 */}
                                            <div style={{marginTop:'5px', display:'flex', alignItems:'center', gap:'6px'}}>
                                                <div style={{flex:1, height:'4px', background:'#f3f4f6', borderRadius:'2px', overflow:'hidden'}}>
                                                    <div style={{height:'100%', width:`${Math.min(100, Math.round(m.activeDays/30*100))}%`, background: accentColor, borderRadius:'2px'}}></div>
                                                </div>
                                                <span className="sans-font" style={{fontSize:'9px', color:'#9ca3af', flexShrink:0}}>活躍 {m.activeDays} 天</span>
                                            </div>
                                        </div>
                                        {/* Level + score */}
                                        <div style={{textAlign:'right', flexShrink:0}}>
                                            <div className="sans-font" style={{fontSize:'15px', fontWeight:'500', color:'#1f2937'}}>Lv.{m.lv}</div>
                                            <div className="sans-font" style={{fontSize:'10px', color:'#9ca3af'}}>{m.score} 點</div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        // ─── Main App ──────────────────────────────────────────────────
        const App = () => {
            const [user, setUser] = useState(null);
            const [authReady, setAuthReady] = useState(false);
            const [userProfile, setUserProfile] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [pendingTaps, setPendingTaps] = useState({});
            const [dailyLogs, setDailyLogs] = useState({});
            const [selectedDateKey, setSelectedDateKey] = useState(null);
            const todayKey = useMemo(() => formatDateKey(new Date()), []);
            const currentWeekDays = useMemo(() => getWeekDays(new Date()), []);

            // Auth state
            useEffect(() => {
                return auth.onAuthStateChanged(u => {
                    setUser(u);
                    setAuthReady(true);
                });
            }, []);

            // Load user profile (team info)
            useEffect(() => {
                if (!user) return;
                const unsub = db.collection('artifacts').doc(appId).collection('users').doc(user.uid)
                    .onSnapshot(snap => {
                        if (snap.exists) setUserProfile(snap.data());
                        else setUserProfile(null);
                    });
                return () => unsub();
            }, [user]);

            // Load daily logs
            useEffect(() => {
                if (!user) return;
                const unsub = db.collection('artifacts').doc(appId).collection('users').doc(user.uid)
                    .collection('dailyLogs').onSnapshot(snap => {
                        const logs = {};
                        snap.forEach(doc => logs[doc.id] = doc.data());
                        setDailyLogs(logs);
                    });
                return () => unsub();
            }, [user]);

            const handleJoinTeam = (teamId, teamName) => {
                setUserProfile(prev => ({ ...prev, teamId, teamName }));
            };

            const isAdmin = user?.email?.toLowerCase().trim() === ADMIN_EMAIL.toLowerCase().trim();

            const stats = useMemo(() => {
                const startOfWeek = currentWeekDays[0];
                let wEx = 0, wPrac = 0, wFive = 0, wActive = 0;
                Object.entries(dailyLogs).forEach(([dateStr, data]) => {
                    const date = new Date(dateStr);
                    if (date >= startOfWeek) {
                        const p = Number(data.practice) || 0;
                        const f = Number(data.fiveMin) || 0;
                        const e = Number(data.exerciseTime) || 0;
                        const s = Number(data.stretchTime) || 0;
                        wPrac += p; wFive += f; wEx += (e + s);
                        if ((p + f + e + s) > 0) wActive++;
                    }
                });
                return { wEx, wPrac, wFive, wActive };
            }, [dailyLogs, currentWeekDays]);

            const handleTap = (type, payload) => {
                const field = type === 'simple' ? payload : payload.key;
                const inc = type === 'simple' ? 1 : Number(payload.mins);
                setPendingTaps(prev => {
                    if (type === 'simple' && prev[field]) {
                        const n = {...prev}; delete n[field]; return n;
                    }
                    return { ...prev, [field]: (prev[field] || 0) + inc };
                });
            };

            const handleCancel = (field) => {
                setPendingTaps(prev => { const n = {...prev}; delete n[field]; return n; });
            };

            const handleCommit = async () => {
                if (!user || Object.keys(pendingTaps).length === 0) {
                    setIsModalOpen(false);
                    return;
                }
                const updates = {};
                Object.entries(pendingTaps).forEach(([field, val]) => {
                    updates[field] = firebase.firestore.FieldValue.increment(val);
                });
                await db.collection('artifacts').doc(appId).collection('users').doc(user.uid)
                    .collection('dailyLogs').doc(todayKey).set(updates, { merge: true });
                window.confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#74c0fc', '#ffd43b', '#ff8787'] });
                setPendingTaps({});
                setSelectedDateKey(null);
                setIsModalOpen(false);
            };

            const handleAccumulate = handleTap;

            const handleClearToday = async () => {
                if (!user) return;
                if (window.confirm("確定要清除今日的所有紀錄嗎？")) {
                    await db.collection('artifacts').doc(appId).collection('users').doc(user.uid)
                        .collection('dailyLogs').doc(todayKey).delete();
                }
            };

            const handleSignOut = async () => {
                if (window.confirm("確定要登出嗎？")) {
                    await auth.signOut();
                    setUserProfile(null);
                }
            };

            // ── Render gates ──────────────────────
            if (!authReady) return (
                <div className="max-w-md mx-auto min-h-screen flex items-center justify-center">
                    <div className="text-center opacity-30 sans-font text-sm">載入中...</div>
                </div>
            );
            if (!user) return <LoginScreen />;
            if (!userProfile?.teamId) return <TeamSelectScreen user={user} onJoinTeam={handleJoinTeam} existingName={userProfile?.displayName || ''} />;

            // ── Main UI ───────────────────────────
            return (
                <div className="max-w-md mx-auto min-h-screen relative flex flex-col">
                    <header className="bg-white sticky top-0 px-5 py-4 flex justify-center items-center z-30 relative" style={{borderBottom:'1px solid var(--c-border)'}}>
                        <div className="flex items-center space-x-3 justify-center">
                            <div className="w-2 h-2 rounded-full pk-blue"></div>
                            <span className="sans-font text-xl tracking-tighter" style={{color:'var(--c-text)'}}>自律動起來</span>
                            <div className="w-2 h-2 rounded-full pk-blue"></div>
                        </div>
                        <div className="absolute right-5 flex items-center gap-2">
                            {isAdmin && <span className="text-[9px] px-2 py-0.5 rounded-full sans-font" style={{background:'var(--c-text)',color:'#fff'}}>管理員</span>}
                            <button onClick={handleSignOut} className="w-8 h-8 bg-slate-100 neo-border-thin rounded-full flex items-center justify-center active-press">
                                <Icon name="LogOut" size={13} />
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 pb-24 space-y-4" style={{padding:'var(--sp-page)'}}>
                        {activeTab === 'dashboard' && (
                            <>
                                {/* 英雄卡：保留原有樣式，道心值改 Lv */}
                                <div className="vibrant-card p-5 r-card float-anim relative overflow-hidden" style={{boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
                                    <div className="relative z-10">
                                        <h2 className="sans-font text-2xl mb-2" style={{color:'var(--c-text)'}}>今日修煉開始！</h2>
                                        <div className="flex items-center gap-2">
                                            <span className="pk-green px-2.5 py-0.5 r-badge text-[11px] font-black neo-border-thin" style={{color:'var(--c-text)'}}>Lv. {(() => { const logs = dailyLogs; let atA=0,atE=0,atS=0,atP=0; Object.values(logs).forEach(v=>{ const p=v.practice||0,f=v.fiveMin||0,e=v.exerciseTime||0,s=v.stretchTime||0; if((p+f+e+s)>0)atA++; atE+=e;atS+=s;atP+=p; }); return calcLevel(Math.round(atA*10+(atE+atS)/60+atP*5)); })()}</span>
                                            <p className="font-black text-xs" style={{color:'var(--c-muted)'}}>累積道行：{(() => { let cnt=0; Object.values(dailyLogs).forEach(v=>{ const p=v.practice||0,f=v.fiveMin||0,e=v.exerciseTime||0,s=v.stretchTime||0; if((p+f+e+s)>0)cnt++; }); return cnt; })()} 天</p>
                                        </div>
                                    </div>
                                </div>

                                {/* 今日四格：日期 header + stat strip */}
                                {(() => {
                                    const now = new Date();
                                    const weekDays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
                                    
                                    // 如果有選擇的日期，則顯示該日期，否則顯示今天
                                    let displayDate = new Date();
                                    let displayKey = todayKey;
                                    if (selectedDateKey) {
                                        const [y, m, d] = selectedDateKey.split('-').map(Number);
                                        displayDate = new Date(y, m - 1, d);
                                        displayKey = selectedDateKey;
                                    }
                                    
                                    const dateLabel = `${displayDate.getMonth()+1}月${displayDate.getDate()}日`;
                                    const weekLabel = weekDays[displayDate.getDay()];
                                    const td = dailyLogs[displayKey] || {};
                                    const prac = Number(td.practice)||0;
                                    const five = Number(td.fiveMin)||0;
                                    const exer = Number(td.exerciseTime)||0;
                                    const stre = Number(td.stretchTime)||0;
                                    const cols = [
                                        { label:'練功',   val: prac, border:'#ffd43b' },
                                        { label:'五分鐘', val: five, border:'#38bdf8' },
                                        { label:'運動',   val: exer, border:'#ff922b' },
                                        { label:'拉筋',   val: stre, border:'#34d399' },
                                    ];

                                    // 本週日～六 7 天
                                    const todayIdx = now.getDay(); // 0=日
                                    const weekBarDays = Array.from({length:7}, (_, i) => {
                                        const d = new Date(now);
                                        d.setDate(now.getDate() - todayIdx + i);
                                        return d;
                                    });
                                    const barLabels = ['日','一','二','三','四','五','六'];

                                    // 每天活躍量（practice + fiveMin + exerciseTime/10 + stretchTime/10，換算成相對分數）
                                    const BAR_MAX_H = 56;

                                    return (
                                        <div style={{background:'var(--c-surface)', borderRadius:'16px', padding:'10px 10px 12px', border:'0.5px solid var(--c-border)'}}>
                                            {/* 日期列 */}
                                            <div style={{padding:'0 4px 8px', display:'flex', alignItems:'baseline', gap:'6px'}}>
                                                <span className="sans-font" style={{fontSize:'13px', fontWeight:'500', color:'var(--c-text)'}}>{dateLabel}</span>
                                                <span className="sans-font" style={{fontSize:'11px', color:'var(--c-muted)'}}>{weekLabel}</span>
                                            </div>
                                            {/* 四格 */}
                                            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:'8px', marginBottom:'10px'}}>
                                                {cols.map(c => (
                                                    <div key={c.label} style={{
                                                        background:'#fff',
                                                        border:`1.5px solid ${c.border}`,
                                                        borderRadius:'12px',
                                                        padding:'12px 6px 10px',
                                                        display:'flex', flexDirection:'column', alignItems:'center', gap:'6px'
                                                    }}>
                                                        <div className="sans-font" style={{fontSize:'24px', fontWeight:'500', lineHeight:1, color: c.val>0 ? 'var(--c-text)' : '#c0c0c0'}}>{c.val>0 ? c.val : '—'}</div>
                                                        <div className="sans-font" style={{fontSize:'11px', color: c.val>0 ? 'var(--c-muted)' : '#c0c0c0'}}>{c.label}</div>
                                                    </div>
                                                ))}
                                            </div>
                                            {/* 本週堆疊條圖 */}
                                            {(() => {
                                                const STACK_MAX_H = 100;
                                                const segments = [
                                                    { field:'practice',     bg:'rgba(251,191,36,0.45)',  scale: v => Math.min(v * 0.2,  20) },
                                                    { field:'fiveMin',      bg:'rgba(56,189,248,0.45)',  scale: v => Math.min(v * 0.2,  20) },
                                                    { field:'exerciseTime', bg:'rgba(251,146,60,0.45)',  scale: v => Math.min(v * 0.01, 20) },
                                                    { field:'stretchTime',  bg:'rgba(52,211,153,0.45)',  scale: v => Math.min(v * 0.01, 20) },
                                                ];
                                                const dayTotals = weekBarDays.map(d => {
                                                    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                                                    const log = dailyLogs[key] || {};
                                                    return segments.map(s => s.scale(Number(log[s.field])||0));
                                                });
                                                const maxTotal = Math.max(...dayTotals.map(segs => segs.reduce((a,b)=>a+b,0)), 1);
                                                return (
                                                    <div style={{borderTop:'0.5px solid var(--c-border)', paddingTop:'12px'}}>
                                                        <div style={{marginBottom:'10px'}}>
                                                            <span className="sans-font" style={{fontSize:'11px', color:'var(--c-muted)'}}>本週活躍量</span>
                                                        </div>
                                                        <div style={{display:'flex', alignItems:'flex-end', gap:'5px', height:`${STACK_MAX_H + 22}px`}}>
                                                            {weekBarDays.map((d, i) => {
                                                                const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                                                                const isToday = i === todayIdx;
                                                                const isSelected = selectedDateKey === dateStr;
                                                                const segs = dayTotals[i];
                                                                const total = segs.reduce((a,b)=>a+b,0);
                                                                const barH = total > 0 ? Math.max(8, Math.round(total / maxTotal * STACK_MAX_H)) : 0;
                                                                const isEmpty = total === 0;
                                                                // 各 segment 的實際 px 高度，等比縮放到 barH
                                                                const segPx = segs.map(v => total > 0 ? Math.round(v / total * barH) : 0);
                                                                return (
                                                                    <div key={i} style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:'5px', cursor: total > 0 ? 'pointer' : 'default'}} 
                                                                        onClick={() => total > 0 && setSelectedDateKey(selectedDateKey === dateStr ? null : dateStr)}>
                                                                        <div style={{width:'100%', height:`${STACK_MAX_H}px`, display:'flex', flexDirection:'column', justifyContent:'flex-end'}}>
                                                                            {isEmpty ? (
                                                                                <div style={{width:'100%', height:'3px', background:'var(--c-border)', borderRadius:'2px'}}></div>
                                                                            ) : (
                                                                                <div style={{
                                                                                    width:'100%',
                                                                                    borderRadius:'5px 5px 0 0',
                                                                                    overflow:'hidden',
                                                                                    borderTop: isSelected ? '3px solid var(--c-primary)' : (isToday ? '2px solid #9ca3af' : 'none'),
                                                                                    borderLeft: isSelected ? '3px solid var(--c-primary)' : (isToday ? '2px solid #9ca3af' : 'none'),
                                                                                    borderRight: isSelected ? '3px solid var(--c-primary)' : (isToday ? '2px solid #9ca3af' : 'none'),
                                                                                    display:'flex',
                                                                                    flexDirection:'column',
                                                                                    height:`${barH}px`,
                                                                                    opacity: isSelected || !selectedDateKey ? 1 : 0.5,
                                                                                    transition: 'opacity 200ms, border 200ms'
                                                                                }}>
                                                                                    {segments.map((s, si) => segPx[si] > 0 && (
                                                                                        <div key={si} style={{background: s.bg, height:`${segPx[si]}px`, flexShrink:0}}></div>
                                                                                    ))}
                                                                                </div>
                                                                            )}
                                                                        </div>
                                                                        <span className="sans-font" style={{fontSize:'9px', color: isSelected ? 'var(--c-primary-text)' : (isToday ? '#4caf6e' : 'var(--c-muted)'), fontWeight: isSelected || isToday ? '500' : '400'}}>{barLabels[i]}</span>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                );
                                            })()}
                                        </div>
                                    );
                                })()}

                                {/* CTA */}
                                <button onClick={() => { setSelectedDateKey(null); setIsModalOpen(true); }} className="w-full pk-pink p-5 r-card neo-border neo-shadow active-press flex items-center justify-center gap-3 group">
                                    <span className="sans-font text-white text-xl tracking-tighter">立即突破</span>
                                </button>
                            </>
                        )}
                        {activeTab === 'calendar' && <CalendarView dailyLogs={dailyLogs} />}
                        {activeTab === 'milestone' && <MilestoneView dailyLogs={dailyLogs} user={user} />}
                        {activeTab === 'profile' && <ProfileView dailyLogs={dailyLogs} isAdmin={isAdmin} user={user} userProfile={userProfile} />}
                        {activeTab === 'leaderboard' && <LeaderboardView currentUser={user} userTeamId={userProfile?.teamId} />}
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-5 overlay-blur">
                            <div className="w-full max-w-sm bg-white r-card neo-border neo-shadow p-6 relative">
                                <button onClick={() => { setIsModalOpen(false); setPendingTaps({}); }} className="absolute -top-3 -right-3 w-8 h-8 bg-white neo-border rounded-full flex items-center justify-center active-press">
                                    <Icon name="X" size={16} />
                                </button>
                                <h3 className="sans-font text-xl mb-6 italic text-center" style={{color:'var(--c-text)'}}>捕捉今日造化</h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <MiniActionCard label="練功" onClick={() => handleTap('simple', 'practice')} bgColor="#ffd43b" tapped={(pendingTaps['practice'] || 0) > 0} />
                                    <MiniActionCard label="五分鐘" onClick={() => handleTap('simple', 'fiveMin')} bgColor="#74c0fc" tapped={(pendingTaps['fiveMin'] || 0) > 0} />
                                    <TimeActionCard label="運動"
                                        onSelect={(mins) => handleTap('time', { key: 'exerciseTime', mins })}
                                        onCancel={() => handleCancel('exerciseTime')}
                                        bgColor="#ff922b"
                                        tapped={(pendingTaps['exerciseTime'] || 0) > 0}
                                        selectedMins={pendingTaps['exerciseTime'] || 0}
                                    />
                                    <TimeActionCard label="拉筋"
                                        onSelect={(mins) => handleTap('time', { key: 'stretchTime', mins })}
                                        onCancel={() => handleCancel('stretchTime')}
                                        bgColor="#34d399"
                                        tapped={(pendingTaps['stretchTime'] || 0) > 0}
                                        selectedMins={pendingTaps['stretchTime'] || 0}
                                    />
                                </div>
                                <div className="mt-6 flex flex-col gap-2">
                                    <button onClick={handleCommit} className="w-full py-4 r-btn sans-font text-lg tracking-widest active-press text-white neo-border neo-shadow-sm" style={{background:'#b197fc', borderColor:'#9775fa'}}>修煉圓滿</button>
                                    <button onClick={handleClearToday} className="w-full py-2 sans-font text-xs hover:text-red-400 transition-colors" style={{color:'var(--c-muted)'}}>清除今日紀錄</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-0 left-0 right-0 z-40 bg-white" style={{borderTop:'1px solid var(--c-border)'}}>
                        <div className="max-w-md mx-auto flex justify-around items-center" style={{padding:'4px 0 6px'}}>
                            <NavBtn active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} navIcon="mountain" label="修煉室" />
                            <NavBtn active={activeTab === 'leaderboard'} onClick={() => setActiveTab('leaderboard')} navIcon="scroll" label="風雲榜" />
                            <NavBtn active={activeTab === 'milestone'} onClick={() => setActiveTab('milestone')} navIcon="milestone" label="里程碑" />
                            <NavBtn active={activeTab === 'profile'} onClick={() => setActiveTab('profile')} navIcon="gate" label="小天地" />
                        </div>
                    </nav>
                </div>
            );
        };

        const WeekIconsRow = ({ days, logs, type, color }) => (
            <div className="flex justify-between">
                {days.map((date, i) => {
                    const key = formatDateKey(date);
                    const isDone = (logs[key]?.[type] || 0) > 0;
                    const isToday = key === formatDateKey(new Date());
                    return (
                        <div key={i} className="flex flex-col items-center gap-1.5">
                            <div className={`w-8 h-8 r-btn flex items-center justify-center transition-all ${isDone ? color : 'bg-slate-100'} ${isToday ? 'ring-2 ring-offset-1' : ''}`}
                                style={{ringColor: isToday ? 'var(--c-primary)' : 'transparent'}}>
                                {isDone ? <Icon name="Smile" size={16} className={color === 'pk-yellow' ? 'text-[#374151]' : 'text-white'} /> : <div className="w-1 h-1 bg-slate-300 rounded-full"/>}
                            </div>
                            <span className="text-[10px] sans-font" style={{color:'var(--c-muted)'}}>{date.getDate()}</span>
                        </div>
                    );
                })}
            </div>
        );

        // ─── Milestone View ─────────────────────────────────────────────
        const MILESTONE_KEYS = [
            { key: 'practice',     label: '練功',   unit: '次',  color: '#ffd43b', field: 'practice' },
            { key: 'fiveMin',      label: '五分鐘', unit: '次',  color: '#38bdf8', field: 'fiveMin' },
            { key: 'exerciseTime', label: '運動',   unit: '分',  color: '#ff922b', field: 'exerciseTime' },
            { key: 'stretchTime',  label: '拉筋',   unit: '分',  color: '#34d399', field: 'stretchTime' },
        ];

        // 各項目每日預設選項
        const DAILY_OPTIONS = {
            practice:     [1, 2],
            fiveMin:      [1, 2],
            exerciseTime: [10, 20, 30, 60],
            stretchTime:  [10, 20, 30, 60],
        };

        const MilestoneView = ({ dailyLogs, user }) => {
            const [goals, setGoals] = useState({});
            // dailyGoals: { practice: 2, fiveMin: 2, ... } 每天目標量
            const [dailyGoals, setDailyGoals] = useState({});
            const [customInput, setCustomInput] = useState({}); // { key: '自訂值字串' }
            const [showCustom, setShowCustom] = useState({}); // { key: true/false }
            const customRefs = useRef({});

            // Load goals from Firestore
            useEffect(() => {
                if (!user) return;
                const unsub = db.collection('artifacts').doc(appId).collection('users').doc(user.uid)
                    .onSnapshot(snap => {
                        if (snap.exists) {
                            setGoals(snap.data().milestoneGoals || {});
                            setDailyGoals(snap.data().milestoneDailyGoals || {});
                        }
                    });
                return () => unsub();
            }, [user]);

            // 選擇每日目標 → 自動存週目標 = daily × 7
            const selectDaily = async (key, daily) => {
                const weeklyGoal = daily * 7;
                const updatedGoals = { ...goals, [key]: weeklyGoal };
                const updatedDaily = { ...dailyGoals, [key]: daily };
                setGoals(updatedGoals);
                setDailyGoals(updatedDaily);
                setShowCustom(prev => ({ ...prev, [key]: false }));
                await db.collection('artifacts').doc(appId).collection('users').doc(user.uid)
                    .set({ milestoneGoals: updatedGoals, milestoneDailyGoals: updatedDaily }, { merge: true });
            };

            // 自訂輸入確認
            const confirmCustom = async (key) => {
                const val = parseInt(customInput[key]);
                if (!val || val <= 0) { setShowCustom(prev => ({ ...prev, [key]: false })); return; }
                await selectDaily(key, val);
            };

            // Calc this week's actual values
            const weekActuals = useMemo(() => {
                const days = getWeekDays(new Date());
                const totals = { practice: 0, fiveMin: 0, exerciseTime: 0, stretchTime: 0 };
                days.forEach(d => {
                    const data = dailyLogs[formatDateKey(d)] || {};
                    Object.keys(totals).forEach(k => { totals[k] += Number(data[k]) || 0; });
                });
                return totals;
            }, [dailyLogs]);

            const setItems = MILESTONE_KEYS.filter(m => goals[m.key]);
            const doneItems = setItems.filter(m => weekActuals[m.field] >= goals[m.key]);
            const inProgressItems = setItems.filter(m => weekActuals[m.field] < goals[m.key]);
            const unsetItems = MILESTONE_KEYS.filter(m => !goals[m.key]);

            const renderCard = (m, isUnset = false) => {
                const actual = weekActuals[m.field];
                const goal = goals[m.key] || 0;
                const daily = dailyGoals[m.key] || 0;
                const pct = goal > 0 ? Math.min(100, Math.round(actual / goal * 100)) : 0;
                const isDone = actual >= goal && goal > 0;
                const opts = DAILY_OPTIONS[m.key];
                const isCustomShown = showCustom[m.key];

                return (
                    <div key={m.key} style={{
                        background: '#fff', borderRadius: '14px', padding: '14px 16px', marginBottom: '8px',
                        border: isUnset ? '0.5px dashed var(--c-border-strong)' : isDone ? '0.5px solid #bbf7d0' : '0.5px solid var(--c-border)'
                    }}>
                        {/* 標題行 */}
                        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'10px'}}>
                            <div style={{display:'flex', alignItems:'center', gap:'6px'}}>
                                <div style={{width:'8px', height:'8px', borderRadius:'50%', background:m.color}}></div>
                                <span className="sans-font" style={{fontSize:'15px', fontWeight:'500', color:'var(--c-text)'}}>{m.label}</span>
                                {!isUnset && <span className="sans-font" style={{fontSize:'12px', color:'var(--c-muted)'}}>每天 {daily} {m.unit}</span>}
                            </div>
                            {isDone && (
                                <span className="sans-font" style={{fontSize:'12px', padding:'2px 9px', borderRadius:'99px', fontWeight:'500',
                                    background:'#f0fdf4', color:'#166534', border:'0.5px solid #bbf7d0'}}>達標</span>
                            )}
                        </div>

                        {/* 未設定時：顯示膠囊選項列 */}
                        {isUnset && (
                            <div style={{display:'flex', gap:'6px', flexWrap:'wrap', marginBottom: '0'}}>
                                {opts.map(opt => {
                                    const isActive = daily === opt && !isCustomShown;
                                    return (
                                        <button key={opt} onClick={() => selectDaily(m.key, opt)}
                                            className="sans-font active-press"
                                            style={{
                                                padding:'5px 13px', borderRadius:'99px', fontSize:'14px', cursor:'pointer',
                                                border: isActive ? 'none' : '0.5px solid var(--c-border-strong)',
                                                background: isActive ? m.color : 'var(--c-surface)',
                                                color: isActive ? '#1f2937' : 'var(--c-text-sub)',
                                                fontWeight: isActive ? '500' : '400',
                                            }}>
                                            {opt} {m.unit}
                                        </button>
                                    );
                                })}
                                {/* 自訂 */}
                                {isCustomShown ? (
                                    <input
                                        ref={el => customRefs.current[m.key] = el}
                                        type="number" inputMode="numeric"
                                        value={customInput[m.key] || ''}
                                        onChange={e => setCustomInput(prev => ({ ...prev, [m.key]: e.target.value }))}
                                        onBlur={() => confirmCustom(m.key)}
                                        onKeyDown={e => e.key === 'Enter' && confirmCustom(m.key)}
                                        placeholder={`自訂 ${m.unit}`}
                                        style={{width:'80px', fontSize:'14px', padding:'5px 10px', borderRadius:'99px',
                                            border:'1px solid var(--c-primary)', outline:'none', textAlign:'center',
                                            fontFamily:"'Noto Sans TC',sans-serif", background:'#fff'}}
                                    />
                                ) : (
                                    <button onClick={() => {
                                            setShowCustom(prev => ({ ...prev, [m.key]: true }));
                                            setTimeout(() => customRefs.current[m.key]?.focus(), 50);
                                        }}
                                        className="sans-font active-press"
                                        style={{padding:'5px 13px', borderRadius:'99px', fontSize:'14px', cursor:'pointer',
                                            border:'0.5px dashed var(--c-border-strong)', background:'var(--c-surface)', color:'var(--c-muted)'}}>
                                        自訂
                                    </button>
                                )}
                            </div>
                        )}

                        {/* 已設定時：只顯示進度條，不顯示膠囊選項 */}
                        {!isUnset && (
                            <>
                                <div style={{display:'flex', alignItems:'center', gap:'10px'}}>
                                    <div style={{flex:1, height:'6px', background:'#f3f4f6', borderRadius:'3px', overflow:'hidden'}}>
                                        <div style={{height:'100%', width:`${pct}%`, background: m.color, borderRadius:'3px'}}></div>
                                    </div>
                                    <span className="sans-font" style={{fontSize:'13px', color:'var(--c-text-sub)', minWidth:'70px', textAlign:'right'}}>
                                        {actual} / {goal} {m.unit}
                                    </span>
                                </div>
                                <div style={{display:'flex', justifyContent:'space-between', marginTop:'5px'}}>
                                    <span className="sans-font" style={{fontSize:'12px', color:'var(--c-muted)'}}>週目標 {goal} {m.unit}</span>
                                    {!isDone && (
                                        <span className="sans-font" style={{fontSize:'12px', color:'#1d4ed8'}}>
                                            尚欠 {goal - actual} {m.unit}
                                        </span>
                                    )}
                                </div>
                            </>
                        )}
                    </div>
                );
            };

            return (
                <div className="animate-in fade-in duration-300" style={{paddingBottom:'2rem'}}>
                    {/* Header */}
                    <div className="vibrant-card p-5 r-card float-anim relative overflow-hidden" style={{boxShadow:'0 1px 4px rgba(0,0,0,0.06)', marginBottom:'16px'}}>
                        <h2 className="sans-font text-2xl mb-1" style={{color:'var(--c-text)'}}>里程碑</h2>
                        <p className="text-[10px] sans-font" style={{color:'var(--c-muted)'}}>立目標、勤精進 (系統以週為單位計算)</p>
                    </div>

                    {/* 進行中 */}
                    {inProgressItems.length > 0 && inProgressItems.map(m => renderCard(m))}

                    {/* 達標 */}
                    {doneItems.length > 0 && (
                        <>
                            <p className="sans-font" style={{fontSize:'10px', color:'var(--c-muted)', letterSpacing:'0.5px', padding:'8px 2px 6px'}}>已達標</p>
                            {doneItems.map(m => renderCard(m))}
                        </>
                    )}

                    {/* 未設定 */}
                    {unsetItems.length > 0 && (
                        <>
                            <p className="sans-font" style={{fontSize:'10px', color:'var(--c-muted)', letterSpacing:'0.5px', padding:'8px 2px 6px'}}>尚未設定</p>
                            {unsetItems.map(m => renderCard(m, true))}
                        </>
                    )}

                </div>
            );
        };

        const CalendarView = ({ dailyLogs }) => {
            const [viewMode, setViewMode] = useState('week');
            const [viewDate, setViewDate] = useState(new Date());
            const monthData = useMemo(() => {
                const year = viewDate.getFullYear();
                const month = viewDate.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const grid = [];
                for (let i = 0; i < firstDay; i++) grid.push(null);
                for (let d = 1; d <= daysInMonth; d++) grid.push(new Date(year, month, d));
                return grid;
            }, [viewDate]);
            const weekList = useMemo(() => getWeekDays(viewDate), [viewDate]);
            const prevWeek = () => { const d = new Date(viewDate); d.setDate(d.getDate() - 7); setViewDate(d); };
            const nextWeek = () => { const d = new Date(viewDate); d.setDate(d.getDate() + 7); setViewDate(d); };
            const weekLabel = useMemo(() => {
                const days = getWeekDays(viewDate);
                const s = days[0], e = days[6];
                return `${s.getMonth()+1}/${s.getDate()} – ${e.getMonth()+1}/${e.getDate()}`;
            }, [viewDate]);
            return (
                <div className="space-y-4 animate-in fade-in duration-300">
                    <div className="flex bg-white r-card" style={{border:'1px solid var(--c-border)', padding:'3px'}}>
                        <button onClick={() => setViewMode('week')} className={`flex-1 sans-font text-xs r-btn transition-all ${viewMode === 'week' ? 'pk-blue' : ''}`}
                            style={{color: viewMode === 'week' ? 'var(--c-primary-text)' : 'var(--c-muted)', padding:'6px 0'}}>週曆</button>
                        <button onClick={() => setViewMode('month')} className={`flex-1 sans-font text-xs r-btn transition-all ${viewMode === 'month' ? 'pk-blue' : ''}`}
                            style={{color: viewMode === 'month' ? 'var(--c-primary-text)' : 'var(--c-muted)', padding:'6px 0'}}>月誌</button>
                    </div>
                    {viewMode === 'month' ? (
                        <div className="bg-white p-5 r-card card-shadow">
                            <div className="flex justify-between items-center mb-4">
                                <button onClick={() => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() - 1))} className="w-8 h-8 bg-slate-50 r-btn flex items-center justify-center active-press" style={{border:'1px solid var(--c-border)'}}><Icon name="ChevronLeft" size={16} /></button>
                                <h2 className="sans-font text-base" style={{color:'var(--c-text)'}}>{viewDate.getFullYear()} / {viewDate.getMonth() + 1}</h2>
                                <button onClick={() => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() + 1))} className="w-8 h-8 bg-slate-50 r-btn flex items-center justify-center active-press" style={{border:'1px solid var(--c-border)'}}><Icon name="ChevronRight" size={16} /></button>
                            </div>
                            <div className="grid grid-cols-7 gap-1.5">
                                {['日','一','二','三','四','五','六'].map(w => <div key={w} className="text-center text-[10px] sans-font" style={{color:'var(--c-muted)'}}>{w}</div>)}
                                {monthData.map((date, i) => {
                                    if (!date) return <div key={i} />;
                                    const key = formatDateKey(date);
                                    const hasLog = dailyLogs[key] && Object.values(dailyLogs[key]).some(v => v > 0);
                                    const isToday = key === formatDateKey(new Date());
                                    return (
                                        <div key={i} className={`aspect-square flex flex-col items-center justify-center r-btn text-sm sans-font relative ${isToday ? 'pk-blue' : hasLog ? 'bg-slate-100' : ''}`}
                                            style={{color: isToday ? 'var(--c-primary-text)' : 'var(--c-text)'}}>
                                            {hasLog && !isToday ? <Icon name="Smile" size={16} style={{color:'var(--c-danger)'}} /> : date.getDate()}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    ) : (
                        <div className="space-y-2">
                            <div className="flex justify-between items-center px-1 pb-1">
                                <button onClick={prevWeek} className="w-8 h-8 bg-white r-btn flex items-center justify-center active-press" style={{border:'1px solid var(--c-border)'}}><Icon name="ChevronLeft" size={16} /></button>
                                <span className="sans-font text-xs" style={{color:'var(--c-muted)'}}>{weekLabel}</span>
                                <button onClick={nextWeek} className="w-8 h-8 bg-white r-btn flex items-center justify-center active-press" style={{border:'1px solid var(--c-border)'}}><Icon name="ChevronRight" size={16} /></button>
                            </div>
                            {weekList.map((date) => {
                                const key = formatDateKey(date);
